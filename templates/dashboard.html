{% extends "base.html" %}

{% block title %}Home — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Welcome back, {{ user["name"].split()[0] }}!</h1>
            <p class="auth-subtitle">Track every rupee. Own your finances.</p>
        </div>

        <div class="auth-card">
            <p>You're signed in as <strong>{{ user["email"] }}</strong>.</p>
        </div>

    </div>
</section>

{% endblock %}
